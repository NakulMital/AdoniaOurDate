                        {gameState === 'start' && (
                            <div class="flex flex-col items-center py-8">
                                <div class="mb-8 shake cursor-pointer group" onClick={() => setGameState('game')}>
                                    <div class="w-48 h-48 bg-primary-fixed-dim pixel-border rounded-full flex items-center justify-center shadow-[4px_4px_0px_0px_rgba(27,28,28,1)] relative overflow-hidden">
                                        <span class="material-symbols-outlined text-primary text-8xl" style={{fontVariationSettings: "'FILL' 1"}}>lock_open</span>
                                        <div class="absolute inset-0 shimmer opacity-50"></div>
                                    </div>
                                    <p class="mt-4 font-note-text text-note-text text-center rotate-2">Tap to unlock your destiny...</p>
                                </div>
                            </div>
                        )}

                        {gameState === 'game' && (
                            <div class="flex flex-col items-center w-full">
                                <div class="mb-6 w-full bg-surface-container border-2 border-on-surface p-4 rotate-[-1deg] shadow-[4px_4px_0px_0px_rgba(27,28,28,1)]">
                                    <p class="font-headline-md text-headline-md text-on-surface text-center leading-tight">
                                        {questions[currentStep].q}
                                    </p>
                                </div>
                                <div class="grid grid-cols-1 gap-4 w-full">
                                    <button class="group relative bg-on-surface p-4 text-left hover:scale-[1.01] transition-transform" onClick={() => handleChoice('A')}>
                                        <div class="bg-secondary-fixed text-on-secondary-fixed p-4 border-2 border-white font-body-lg h-full">
                                            <span class="font-label-pixel text-label-pixel block mb-2 opacity-60 uppercase">Choice A (Girl So In Love)</span>
                                            {questions[currentStep].a}
                                        </div>
                                        <div class="absolute bottom-1 right-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <span class="material-symbols-outlined text-secondary">star</span>
                                        </div>
                                    </button>
                                    <button class="group relative bg-on-surface p-4 text-left hover:scale-[1.01] transition-transform" onClick={() => handleChoice('B')}>
                                        <div class="bg-surface-variant text-on-surface-variant p-4 border-2 border-white font-body-lg h-full">
                                            <span class="font-label-pixel text-label-pixel block mb-2 opacity-60 uppercase">Choice B (You Seem Pretty Sad)</span>
                                            {questions[currentStep].b}
                                        </div>
                                        <div class="absolute bottom-1 right-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <span class="material-symbols-outlined text-on-surface-variant">heart_broken</span>
                                        </div>
                                    </button>
                                </div>
                                <div class="mt-8 flex gap-3">
                                    {questions.map((_, i) => (
                                        <div key={i} class={`w-4 h-4 rounded-full border-2 border-on-surface ${i === currentStep ? 'bg-primary' : i < currentStep ? 'bg-on-surface' : 'bg-surface'}`}></div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {gameState === 'result' && (
                            <div class="flex flex-col items-center w-full py-6">
                                <div class={`w-56 h-56 pixel-border rounded-full flex flex-col items-center justify-center shadow-[8px_8px_0px_0px_rgba(27,28,28,1)] relative transition-all duration-1000 scale-110 mb-8 ${score >= 0 ? 'bg-secondary-container border-primary' : 'bg-surface-variant border-on-surface-variant'}`}>
                                    <span class={`material-symbols-outlined text-8xl ${score >= 0 ? 'text-primary' : 'text-on-surface-variant'}`} style={{fontVariationSettings: "'FILL' 1"}}>
                                        {score >= 0 ? 'favorite' : 'heart_broken'}
                                    </span>
                                    <div class="absolute inset-0 shimmer opacity-75"></div>
                                </div>
                                <h2 class={`font-headline-lg text-headline-lg text-center uppercase mb-4 rotate-2 ${score >= 0 ? 'text-primary' : 'text-on-surface-variant'}`}>
                                    {score >= 0 ? '🌸 "Girl So In Love"' : '🎸 "You Seem Pretty Sad"'}
                                </h2>
                                <p class="font-note-text text-note-text text-center max-w-sm mb-8">
                                    {score >= 0 
                                        ? "You are living in the sweetest, coziest part of the album. Total heart-eyes, comfortable love, and \"heart forever\" energy!"
                                        : "You aren't actually sad—you're just the iconic Olivia Rodrigo main character! You have high expectations, a love for dramatic flair, and you keep things exciting."}
                                </p>
                                <div class="flex flex-col md:flex-row gap-4 w-full justify-center">
                                    <button class="bg-tertiary text-on-tertiary px-8 py-4 font-label-pixel text-label-pixel duct-tape-texture rotate-1 shadow-[4px_4px_0px_0px_rgba(27,28,28,1)] hover:scale-110 active:translate-y-1 transition-all" onClick={resetGame}>
                                        PLAY AGAIN
                                    </button>
                                    <Link to="/" class="border-b-2 border-on-surface font-label-pixel text-label-pixel py-4 px-8 text-center hover:bg-surface-variant/30 transition-colors">
                                        READ THE LETTER
                                    </Link>
                                </div>
                            </div>
                        )}
                        
                        {isGlitching && <div class="glitch-anim fixed inset-0 bg-primary/20 pointer-events-none z-[100]"></div>}
                    </div>
                </main>
            );
        };

        // --- App Shell ---

        const App = () => {
            return (
                <MemoryRouter>
                    <Header />
                    <Routes>
                        <Route path="/" element={<HomePage />} />
                        <Route path="/mood" element={<MoodLocketPage />} />
                    </Routes>
                    <BottomNav />
                    
                    {/* Background floating elements (Shared) */}
                    <div class="fixed inset-0 pointer-events-none z-[-1] opacity-40">
                        <div class="absolute top-1/4 left-10 text-4xl -rotate-12">🌟</div>
                        <div class="absolute top-3/4 right-20 text-5xl rotate-45">⚡</div>
                        <div class="absolute bottom-20 left-1/3 text-3xl -rotate-6">🌈</div>
                        <div class="absolute top-1/2 right-1/4 text-4xl rotate-12">🍒</div>
                    </div>
                </MemoryRouter>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
